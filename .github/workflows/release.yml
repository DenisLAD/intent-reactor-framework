name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set Maven project version
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

      - name: Build and package
        run: mvn clean install -Prelease -DskipTests

      - name: Run tests
        run: mvn test

      - name: Collect JARs
        run: |
          mkdir -p release-artifacts
          find . -path ./release-artifacts -prune -o \
                 -name "*.jar" \
                 -path "*/target/*" \
                 -print \
                 -exec cp {} release-artifacts/ \;

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "IntentReactor ${{ github.ref_name }}" \
            --generate-notes \
            release-artifacts/*.jar
